<div class="auth-wrapper">
    <div class="auth-card">

        <div class="auth-header">
            <h2>Créer un compte</h2>
            <p>Rejoignez la plateforme pour gérer vos projets efficacement.</p>
        </div>

        <form (ngSubmit)="inscription()">

            <div class="form-row">
                <!-- NOM -->
                <div class="form-group">
                    <label class="form-label" for="first_name">Nom</label>
                    <input type="text" id="first_name" [(ngModel)]="formData.first_name" name="first_name" class="form-control" placeholder="Ex: Dupont" required />
                </div>

                <!-- PRÉNOM -->
                <div class="form-group">
                    <label class="form-label" for="last_name">Prénom</label>
                    <input type="text" id="last_name" [(ngModel)]="formData.last_name" name="last_name" class="form-control" placeholder="Ex: Jean" required />
                </div>
            </div>

            <!-- USERNAME -->
            <div class="form-group">
                <label class="form-label" for="username">Nom d'utilisateur</label>
                <input type="text" id="username" [(ngModel)]="formData.username" name="username" class="form-control" placeholder="Ex: jeandupont" required />
            </div>

            <!-- EMAIL -->
            <div class="form-group">
                <label class="form-label" for="email">Adresse Email</label>
                <input type="email" id="email" [(ngModel)]="formData.email" name="email" class="form-control" placeholder="Ex: jean.dupont@exemple.com" required />
            </div>

            <!-- MOT DE PASSE -->
            <div class="form-group">
                <label class="form-label" for="password">Mot de passe</label>
                <input type="password" id="password" [(ngModel)]="formData.password" name="password" class="form-control" placeholder="••••••••" required />
            </div>

            <!-- ACTIONS -->
            <button type="submit" class="btn-auth-submit">
                Créer un compte
            </button>

        </form>

        <!-- REDIRECTION CONNEXION -->
        <div class="auth-footer">
            Vous avez déjà un compte ? <a routerLink="/login" class="auth-link">Se connecter</a>
        </div>
    </div>
</div>
