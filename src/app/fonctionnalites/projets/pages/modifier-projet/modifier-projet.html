<app-sidebar></app-sidebar>

<div class="main-content">


    <div class="form-wrapper">
        <div class="form-card">
            <h2 class="form-title">Modifier Projet</h2>

            <form (ngSubmit)="modifierProjet()">

                <!-- TITRE -->
                <div class="form-group">
                    <label class="form-label" for="project-title">Titre du projet</label>
                    <input id="project-title" type="text" [(ngModel)]="formData.titre" aria-label="titre" name="titre" class="form-control" placeholder="Titre du projet">
                </div>

                <!-- DESCRIPTION -->
                <div class="form-group">
                    <label class="form-label" for="project-desc">Description</label>
                    <textarea id="project-desc" [(ngModel)]="formData.description" name="description" class="form-control textarea" placeholder="Décrivez les objectifs du projet..."></textarea>
                </div>

                <!-- STATUT -->
                <div class="form-group">
                    <label class="form-label" for="project-status">Statut du projet</label>
                    <select id="project-status" [(ngModel)]="formData.statut" name="statut" class="form-control select">
                        <option value="PROGRAMMATION">Programmation</option>
                        <option value="ACTIF">Actif</option>
                        <option value="EN_ATTENTE">En attente</option>
                        <option value="COMPLETE">Complété</option>
                    </select>
                </div>

                <!-- ACTIONS -->
                <div class="form-actions">
                    <button type="submit" class="btn-submit">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" class="btn-icon">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M4.5 12.75l6 6 9-13.5" />
                        </svg>
                        Enregistrer
                    </button>
                </div>

            </form>
        </div>
    </div>
</div>
